version: "3.9"

# ══════════════════════════════════════════════════════════════
# AI Churn Platform — Full Stack
# ══════════════════════════════════════════════════════════════

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    PYTHONPATH: /opt/airflow
  volumes:
    - ./airflow_dags:/opt/airflow/dags
    - ./ml_training:/opt/airflow/ml_training
    - ./data_ingestion:/opt/airflow/data_ingestion
    - ./models:/opt/airflow/models
    - ./data:/opt/airflow/data
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - churn_net

services:

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: churn_postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - churn_net

  # ── MLflow ───────────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: churn_mlflow
    command: >
      bash -c "pip install mlflow psycopg2-binary --quiet &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - churn_net

  # ── FastAPI ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: churn_api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - churn_net
    restart: unless-stopped

  # ── Streamlit ────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    container_name: churn_dashboard
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      - api
    networks:
      - churn_net
    restart: unless-stopped

  # ── Airflow Init ─────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: churn_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@churn.ai \
          --password admin
    restart: on-failure

  # ── Airflow Webserver ────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: churn_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Airflow Scheduler ────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: churn_airflow_scheduler
    command: scheduler
    restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────────
volumes:
  postgres_data:
  mlflow_data:
  airflow_logs:

# ── Network ───────────────────────────────────────────────────
networks:
  churn_net:
    driver: bridge