name: CI — Churn Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Lint ────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install black flake8 isort

      - name: Black format check
        run: black . --check --line-length 88 --exclude="dbt_project/|\.venv"

      - name: isort check
        run: isort . --check-only --profile black --skip dbt_project

      - name: Flake8 lint
        run: |
          flake8 . \
            --max-line-length 88 \
            --exclude=.venv,__pycache__,dbt_project/target,dbt_project/dbt_packages \
            --extend-ignore=E501,W503,E203

  # ── Test ────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data ingestion
        run: |
          python data_ingestion/ingest_telco.py
          python data_ingestion/ingest_ecommerce.py

      - name: Train models
        run: |
          python ml_training/churn/train_churn.py
          python ml_training/revenue/train_revenue.py
          python ml_training/segmentation/train_segmentation.py
          python ml_training/anomaly/train_anomaly.py

      - name: Run pytest
        run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

  # ── Docker Build ─────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for build
        run: cp .env.example .env

      - name: Create model placeholders
        run: |
          mkdir -p models
          python data_ingestion/ingest_telco.py
          python data_ingestion/ingest_ecommerce.py
          pip install -r requirements.txt
          python ml_training/churn/train_churn.py
          python ml_training/revenue/train_revenue.py
          python ml_training/segmentation/train_segmentation.py
          python ml_training/anomaly/train_anomaly.py

      - name: Build API image
        run: docker build -f docker/api/Dockerfile -t churn-api:latest .

      - name: Build Dashboard image
        run: docker build -f docker/dashboard/Dockerfile -t churn-dashboard:latest .

      - name: Verify images built
        run: |
          docker images | grep churn-api
          docker images | grep churn-dashboard